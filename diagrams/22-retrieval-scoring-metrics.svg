<text x="571.95703125" y="10528.79296875" font-size="14" font-family="monospace" fill="#2f9e44">Recall@k</text>
<text x="489.34375" y="10551.0703125" font-size="12.281250000000004" font-family="monospace" fill="#495057">Fraction of relevant docs in top-k</text>
<text x="489.34375" y="10566.421875" font-size="12.281250000000004" font-family="monospace" fill="#495057">Recall@5 = 1/1 = 1.0</text>
<rect x="457.19140625" y="10603.0703125" width="304.73828125" height="80" fill="#d0bfff" stroke="#6741d9" stroke-width="2" rx="8" />
<text x="585.1796875" y="10623.8671875" font-size="14" font-family="monospace" fill="#6741d9">NDCG@k</text>
<text x="462.92796875" y="10644.5421875" font-size="11.456249999999999" font-family="monospace" fill="#495057">Normalized Discounted Cumulative Gain</text>
<text x="462.92796875" y="10658.8625" font-size="11.456249999999999" font-family="monospace" fill="#495057">Weights position: higher rank = more credit</text>
