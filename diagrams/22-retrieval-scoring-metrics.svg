<text x="494.640625" y="10436.9609375" font-size="14" font-family="monospace" fill="#1971c2">MRR (Mean Reciprocal Rank)</text>
<text x="494.5625" y="10458.35" font-size="12.271874999999993" font-family="monospace" fill="#495057">1/rank of first correct result</text>
<text x="494.5625" y="10473.68984375" font-size="12.271874999999993" font-family="monospace" fill="#495057">MRR = 1/1 = 1.0 (best)</text>
