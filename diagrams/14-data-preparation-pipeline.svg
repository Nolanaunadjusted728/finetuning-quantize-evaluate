<svg xmlns="http://www.w3.org/2000/svg" width="700" height="480" viewBox="0 0 700 480">
  <title>Data Preparation Pipeline</title>
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4a9eed"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="white"/>
  <rect x="30" y="50" width="640" height="410" fill="#dbe4ff" stroke="none" rx="12" opacity="0.25"/>
  <text x="350" y="35" font-size="22" fill="#1e1e1e" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-weight="bold" text-anchor="middle">Data Preparation Pipeline</text>
  <text x="350" y="56" font-size="13" fill="#757575" font-family="Segoe UI, Helvetica, Arial, sans-serif" text-anchor="middle">(Non-instructional Fine-tuning)</text>

  <rect x="200" y="75" width="300" height="55" fill="#a5d8ff" stroke="#4a9eed" stroke-width="2" rx="8"/>
  <text x="215" y="98" font-size="16" fill="#1e1e1e" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-weight="600">1.</text>
  <text x="235" y="98" font-size="16" fill="#1e1e1e" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-weight="600">Collect Data</text>
  <text x="235" y="118" font-size="12" fill="#555555" font-family="Segoe UI, Helvetica, Arial, sans-serif">(PDF, txt, docx, any document format)</text>

  <line x1="350" y1="130" x2="350" y2="155" stroke="#4a9eed" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <rect x="200" y="155" width="300" height="55" fill="#fff3bf" stroke="#f59e0b" stroke-width="2" rx="8"/>
  <text x="215" y="178" font-size="16" fill="#1e1e1e" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-weight="600">2.</text>
  <text x="235" y="178" font-size="16" fill="#1e1e1e" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-weight="600">Clean and Filter</text>
  <text x="235" y="198" font-size="12" fill="#555555" font-family="Segoe UI, Helvetica, Arial, sans-serif">(Remove noise, duplicates, low-quality text)</text>

  <line x1="350" y1="210" x2="350" y2="235" stroke="#4a9eed" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <rect x="200" y="235" width="300" height="55" fill="#b2f2bb" stroke="#22c55e" stroke-width="2" rx="8"/>
  <text x="215" y="258" font-size="16" fill="#1e1e1e" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-weight="600">3.</text>
  <text x="235" y="258" font-size="16" fill="#1e1e1e" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-weight="600">Chunk Text</text>
  <text x="235" y="278" font-size="12" fill="#555555" font-family="Segoe UI, Helvetica, Arial, sans-serif">(Split into segments by paragraph/tokens)</text>

  <line x1="350" y1="290" x2="350" y2="315" stroke="#4a9eed" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <rect x="200" y="315" width="300" height="55" fill="#d0bfff" stroke="#8b5cf6" stroke-width="2" rx="8"/>
  <text x="215" y="338" font-size="16" fill="#1e1e1e" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-weight="600">4.</text>
  <text x="235" y="338" font-size="16" fill="#1e1e1e" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-weight="600">Tokenize</text>
  <text x="235" y="358" font-size="12" fill="#555555" font-family="Segoe UI, Helvetica, Arial, sans-serif">(Assign numerical IDs to each token)</text>

  <line x1="350" y1="370" x2="350" y2="395" stroke="#4a9eed" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <rect x="200" y="395" width="300" height="55" fill="#ffc9c9" stroke="#ef4444" stroke-width="2" rx="8"/>
  <text x="215" y="418" font-size="16" fill="#1e1e1e" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-weight="600">5.</text>
  <text x="235" y="418" font-size="16" fill="#1e1e1e" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-weight="600">Train</text>
  <text x="235" y="438" font-size="12" fill="#555555" font-family="Segoe UI, Helvetica, Arial, sans-serif">(Next-token prediction objective)</text>
</svg>