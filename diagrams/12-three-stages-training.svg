<svg xmlns="http://www.w3.org/2000/svg" width="640" height="480" viewBox="0 0 640 480">
  <title>Three Stages of LLM Training</title>
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4a9eed"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22c55e"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="white"/>
  <rect x="40" y="60" width="560" height="400" fill="#dbe4ff" stroke="none" rx="12" opacity="0.3"/>
  <text x="320" y="40" font-size="24" fill="#1e1e1e" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-weight="bold" text-anchor="middle">Three Stages of LLM Training</text>
  <rect x="130" y="85" width="380" height="80" fill="#a5d8ff" stroke="#4a9eed" stroke-width="2" rx="8"/>
  <text x="320" y="118" font-size="18" fill="#1e1e1e" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-weight="600" text-anchor="middle">Stage 1: Unsupervised Pre-training</text>
  <text x="320" y="142" font-size="16" fill="#555555" font-family="Segoe UI, Helvetica, Arial, sans-serif" text-anchor="middle">(Self-Supervised Learning)</text>
  <line x1="320" y1="165" x2="320" y2="215" stroke="#4a9eed" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="335" y="197" font-size="13" fill="#757575" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-style="italic">Base model produced</text>
  <rect x="130" y="215" width="380" height="80" fill="#b2f2bb" stroke="#22c55e" stroke-width="2" rx="8"/>
  <text x="320" y="248" font-size="18" fill="#1e1e1e" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-weight="600" text-anchor="middle">Stage 2: Supervised Fine-tuning</text>
  <text x="320" y="272" font-size="16" fill="#555555" font-family="Segoe UI, Helvetica, Arial, sans-serif" text-anchor="middle">(SFT)</text>
  <line x1="320" y1="295" x2="320" y2="345" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="335" y="327" font-size="13" fill="#757575" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-style="italic">Instruct model produced</text>
  <rect x="130" y="345" width="380" height="80" fill="#d0bfff" stroke="#8b5cf6" stroke-width="2" rx="8"/>
  <text x="320" y="378" font-size="18" fill="#1e1e1e" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-weight="600" text-anchor="middle">Stage 3: Preference Alignment</text>
  <text x="320" y="402" font-size="16" fill="#555555" font-family="Segoe UI, Helvetica, Arial, sans-serif" text-anchor="middle">(RLHF / DPO)</text>
  <text x="320" y="450" font-size="14" fill="#757575" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-style="italic" text-anchor="middle">Aligned chat model produced</text>
</svg>