<svg xmlns="http://www.w3.org/2000/svg" width="800" height="560" viewBox="0 0 800 560">
  <title>Recommended Fine-Tuning Workflow</title>
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4a9eed"/>
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22c55e"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="white"/>
  <rect x="20" y="55" width="760" height="480" fill="#d3f9d8" stroke="none" rx="12" opacity="0.25"/>
  <text x="400" y="38" font-size="24" fill="#1e1e1e" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-weight="bold" text-anchor="middle">Recommended Fine-Tuning Workflow</text>
  <rect x="280" y="80" width="240" height="60" fill="#a5d8ff" stroke="#4a9eed" stroke-width="2" rx="8"/>
  <text x="400" y="117" font-size="22" fill="#1e1e1e" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-weight="600" text-anchor="middle">Base Model</text>
  <line x1="400" y1="140" x2="400" y2="190" stroke="#4a9eed" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="55" y="230" font-size="18" fill="#15803d" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-weight="bold">Step 1</text>
  <rect x="130" y="195" width="540" height="65" fill="#fff3bf" stroke="#f59e0b" stroke-width="2" rx="8"/>
  <text x="400" y="223" font-size="18" fill="#1e1e1e" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-weight="600" text-anchor="middle">Non-instructional Fine-tuning</text>
  <text x="400" y="247" font-size="15" fill="#555555" font-family="Segoe UI, Helvetica, Arial, sans-serif" text-anchor="middle">(Domain Knowledge)</text>
  <line x1="400" y1="260" x2="400" y2="310" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow-amber)"/>
  <text x="55" y="350" font-size="18" fill="#15803d" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-weight="bold">Step 2</text>
  <rect x="130" y="315" width="540" height="65" fill="#b2f2bb" stroke="#22c55e" stroke-width="2" rx="8"/>
  <text x="400" y="343" font-size="18" fill="#1e1e1e" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-weight="600" text-anchor="middle">Instructional Fine-tuning</text>
  <text x="400" y="367" font-size="15" fill="#555555" font-family="Segoe UI, Helvetica, Arial, sans-serif" text-anchor="middle">(Structured Output)</text>
  <line x1="400" y1="380" x2="400" y2="430" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="55" y="470" font-size="18" fill="#15803d" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-weight="bold">Step 3</text>
  <rect x="130" y="435" width="540" height="65" fill="#d0bfff" stroke="#8b5cf6" stroke-width="2" rx="8"/>
  <text x="400" y="463" font-size="18" fill="#1e1e1e" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-weight="600" text-anchor="middle">Preference Alignment</text>
  <text x="400" y="487" font-size="15" fill="#555555" font-family="Segoe UI, Helvetica, Arial, sans-serif" text-anchor="middle">(RLHF / DPO)</text>
</svg>