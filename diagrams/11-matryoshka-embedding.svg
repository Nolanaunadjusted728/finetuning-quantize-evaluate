    <text x="45.6" y="389.4" font-size="13" fill="#1e1e1e" font-family="'Courier New',monospace" opacity="1.0">Truncation = just take first N dimensions</text>
    <text x="45.6" y="406.3" font-size="13" fill="#1e1e1e" font-family="'Courier New',monospace" opacity="1.0">Storage:  768-dim × 4 bytes = 3,072 bytes/vector</text>
    <text x="45.6" y="423.2" font-size="13" fill="#1e1e1e" font-family="'Courier New',monospace" opacity="1.0">          256-dim × 4 bytes = 1,024 bytes/vector  (3× cheaper)</text>
    <text x="45.6" y="440.1" font-size="13" fill="#1e1e1e" font-family="'Courier New',monospace" opacity="1.0">           64-dim × 4 bytes =   256 bytes/vector  (12× cheaper)</text>
